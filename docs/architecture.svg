<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-label="cek architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF3E0"/>
      <stop offset="100%" stop-color="#F0E8D4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2D6A2D"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1A3A1A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6B7B6B"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2D6A2D"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="520" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="460" y="38" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1A3A1A">cek  System Architecture</text>
  <text x="460" y="58" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6B7B6B">Manifest V3 Chrome extension · local-first · optional Groq cloud</text>

  <!-- AI Platforms -->
  <g filter="url(#shadow)">
    <rect x="40" y="88" width="160" height="72" rx="12" fill="#FFFFFF" stroke="#E0D8C0" stroke-width="1.5"/>
    <text x="120" y="118" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A3A1A">ChatGPT</text>
    <text x="120" y="138" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6B7B6B">chatgpt.com</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="176" width="160" height="72" rx="12" fill="#FFFFFF" stroke="#E0D8C0" stroke-width="1.5"/>
    <text x="120" y="206" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A3A1A">Claude</text>
    <text x="120" y="226" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6B7B6B">claude.ai</text>
  </g>
  <g opacity="0.55">
    <rect x="40" y="264" width="160" height="72" rx="12" fill="#FFFFFF" stroke="#E0D8C0" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="120" y="294" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6B7B6B">Gemini</text>
    <text x="120" y="314" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6B7B6B">coming soon</text>
  </g>

  <!-- Content Scripts -->
  <g filter="url(#shadow)">
    <rect x="260" y="120" width="180" height="180" rx="12" fill="#FFFFFF" stroke="#2D6A2D" stroke-width="2"/>
    <rect x="260" y="120" width="180" height="32" rx="12" fill="#2D6A2D"/>
    <rect x="260" y="140" width="180" height="12" fill="#2D6A2D"/>
    <text x="350" y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#FAF3E0">Content Scripts</text>
    <text x="276" y="172" font-family="JetBrains Mono, monospace" font-size="10" fill="#1A3A1A">chatgpt.ts · claude.ts</text>
    <text x="276" y="192" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6B7B6B">via shared.ts</text>
    <line x1="276" y1="204" x2="424" y2="204" stroke="#E0D8C0"/>
    <text x="276" y="222" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Capture prompts on send</text>
    <text x="276" y="240" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Scrape conversation chars</text>
    <text x="276" y="258" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Detect model label</text>
    <text x="276" y="276" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Optional on-page badge</text>
  </g>

  <!-- Arrows: platforms ’ content scripts -->
  <line x1="200" y1="124" x2="258" y2="160" stroke="#6B7B6B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="212" x2="258" y2="210" stroke="#6B7B6B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Background Service Worker -->
  <g filter="url(#shadow)">
    <rect x="500" y="88" width="200" height="240" rx="12" fill="#FFFFFF" stroke="#2D6A2D" stroke-width="2"/>
    <rect x="500" y="88" width="200" height="32" rx="12" fill="url(#accent)"/>
    <rect x="500" y="108" width="200" height="12" fill="url(#accent)"/>
    <text x="600" y="110" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#FAF3E0">Service Worker</text>
    <text x="516" y="140" font-family="JetBrains Mono, monospace" font-size="10" fill="#1A3A1A">service-worker.ts</text>
    <line x1="516" y1="152" x2="684" y2="152" stroke="#E0D8C0"/>
    <text x="516" y="170" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Prompt capture &amp; dedupe</text>
    <text x="516" y="188" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Token estimation</text>
    <text x="516" y="206" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Message limit windows</text>
    <text x="516" y="224" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Session management</text>
    <text x="516" y="242" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Semantic search routing</text>
    <text x="516" y="260" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" 15-min alarm (reset windows)</text>
    <text x="516" y="278" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Prune to 500 prompts</text>
    <text x="516" y="296" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" chrome.runtime.onMessage</text>
  </g>

  <!-- Arrow: content ’ service worker -->
  <line x1="440" y1="210" x2="498" y2="210" stroke="#2D6A2D" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <text x="469" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2D6A2D">messages</text>

  <!-- Chrome Local Storage -->
  <g filter="url(#shadow)">
    <rect x="500" y="360" width="200" height="120" rx="12" fill="#FFFFFF" stroke="#E0D8C0" stroke-width="1.5"/>
    <text x="600" y="386" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A3A1A">chrome.storage.local</text>
    <line x1="516" y1="398" x2="684" y2="398" stroke="#E0D8C0"/>
    <text x="516" y="416" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">prompts · sessions · embeddings</text>
    <text x="516" y="434" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">messageCounts · contextUsage</text>
    <text x="516" y="452" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6B7B6B">All data stays on your device</text>
    <text x="516" y="468" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6B7B6B">unless Groq is enabled</text>
  </g>

  <!-- Arrow: service worker ” storage -->
  <line x1="600" y1="328" x2="600" y2="358" stroke="#6B7B6B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="368" x2="590" y2="338" stroke="#6B7B6B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- UI Layer -->
  <g filter="url(#shadow)">
    <rect x="740" y="88" width="140" height="88" rx="12" fill="#FFFFFF" stroke="#E0D8C0" stroke-width="1.5"/>
    <text x="810" y="118" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A3A1A">Popup</text>
    <text x="810" y="138" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6B7B6B">Alt+Shift+C</text>
    <text x="810" y="158" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6B7B6B">History · search · context</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="740" y="192" width="140" height="72" rx="12" fill="#FFFFFF" stroke="#E0D8C0" stroke-width="1.5"/>
    <text x="810" y="222" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A3A1A">Settings</text>
    <text x="810" y="242" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6B7B6B">Tiers · Groq · debug</text>
  </g>

  <!-- Arrows: UI ” service worker -->
  <line x1="740" y1="132" x2="700" y2="160" stroke="#6B7B6B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="228" x2="740" y2="228" stroke="#6B7B6B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="718" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6B7B6B">GET_STATE</text>

  <!-- Groq API (optional) -->
  <g filter="url(#shadow)">
    <rect x="740" y="300" width="140" height="100" rx="12" fill="#FFFFFF" stroke="#D4820A" stroke-width="1.5" stroke-dasharray="0"/>
    <rect x="740" y="300" width="140" height="28" rx="12" fill="#D4820A" opacity="0.15"/>
    <text x="810" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#D4820A">Groq API</text>
    <text x="810" y="342" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6B7B6B">optional · user key</text>
    <text x="754" y="362" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Embeddings (search)</text>
    <text x="754" y="380" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1A3A1A">" Titles · dedupe</text>
  </g>

  <!-- Arrow: service worker ’ Groq -->
  <line x1="700" y1="280" x2="738" y2="330" stroke="#D4820A" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="712" y="296" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D4820A">if enabled</text>

  <!-- Legend -->
  <rect x="40" y="370" width="180" height="110" rx="10" fill="#FFFFFF" fill-opacity="0.7" stroke="#E0D8C0"/>
  <text x="56" y="394" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A3A1A">Message types</text>
  <text x="56" y="416" font-family="JetBrains Mono, monospace" font-size="9" fill="#2D6A2D">PROMPT_CAPTURED</text>
  <text x="56" y="432" font-family="JetBrains Mono, monospace" font-size="9" fill="#2D6A2D">CONTEXT_UPDATED</text>
  <text x="56" y="448" font-family="JetBrains Mono, monospace" font-size="9" fill="#2D6A2D">SEMANTIC_SEARCH</text>
  <text x="56" y="464" font-family="JetBrains Mono, monospace" font-size="9" fill="#2D6A2D">GET_STATE</text>
</svg>
