<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1 class="wordmark">cek</h1>
        <div class="header-actions">
          <button id="graph-btn" class="link-btn header-link" type="button" title="Knowledge graph">Graph</button>
          <span id="groq-indicator" class="groq-indicator hidden" title="Smart features on">✦</span>
          <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
        </div>
      </header>

      <div id="context-match-banner" class="context-match-banner hidden">
        <p id="context-match-text"></p>
        <div class="context-match-actions">
          <button id="context-inject-btn" class="pill-btn primary" type="button">Inject context</button>
          <button id="context-dismiss-btn" class="pill-btn" type="button">Dismiss</button>
        </div>
      </div>

      <div id="setup-banner" class="setup-banner hidden">
        <p>Set up your subscription tiers to track daily limits.</p>
        <button id="setup-link" class="link-btn">Set up your tiers →</button>
      </div>

      <div id="platform-strip" class="platform-strip"></div>

      <section id="context-section" class="context-section hidden">
        <div class="context-meta">
          <span id="context-model"></span>
          <span id="context-counts" class="mono"></span>
        </div>
        <div class="progress-track">
          <div id="context-bar" class="progress-fill"></div>
        </div>
        <p id="context-readout" class="context-readout"></p>
      </section>

      <div class="search-row">
        <input
          id="search-input"
          type="search"
          placeholder="Search prompts…"
          autocomplete="off"
        />
        <button id="semantic-btn" class="pill-btn hidden" type="button">Semantic</button>
      </div>

      <section id="pinned-section" class="pinned-section hidden">
        <button id="pinned-toggle" class="section-toggle" type="button">
          ▼ Pinned (<span id="pinned-count">0</span>)
        </button>
        <div id="pinned-list" class="prompt-list"></div>
      </section>

      <section id="history-section" class="history-section">
        <div id="history-list"></div>
        <p id="empty-state" class="empty-state">Nothing yet. Start a conversation.</p>
      </section>

      <footer class="footer">
        <button id="export-btn" class="link-btn" type="button">Export pinned</button>
      </footer>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
