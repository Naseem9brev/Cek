<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="brand">
          <span class="wordmark">cek</span>
          <span id="groq-indicator" class="groq-indicator hidden" title="Smart features on">✦</span>
        </div>
        <button type="button" id="settings-btn" class="icon-btn" title="Settings">⚙</button>
      </header>

      <div id="setup-banner" class="setup-banner hidden">
        <span>Set up your subscription tiers.</span>
        <button type="button" id="setup-link" class="link-btn">Open settings</button>
      </div>

      <div id="platform-strip" class="platform-strip"></div>

      <section id="context-section" class="context-section hidden">
        <div class="context-header">
          <span id="context-model"></span>
          <span id="context-counts" class="mono"></span>
        </div>
        <div class="progress-track">
          <div id="context-bar" class="progress-fill"></div>
        </div>
        <p id="context-readout" class="context-readout"></p>
      </section>

      <div class="search-row">
        <input type="search" id="search-input" placeholder="Search prompts…" />
        <button type="button" id="semantic-btn" class="semantic-btn hidden">Semantic</button>
      </div>

      <section id="pinned-section" class="pinned-section hidden">
        <button type="button" id="pinned-toggle" class="section-toggle">
          ▼ Pinned (<span id="pinned-count">0</span>)
        </button>
        <div id="pinned-list" class="prompt-list"></div>
      </section>

      <main class="history">
        <p id="empty-state" class="empty-state">Nothing yet. Start a conversation.</p>
        <div id="history-list" class="prompt-list"></div>
      </main>

      <footer class="footer">
        <button type="button" id="export-btn" class="text-btn">Export pinned</button>
      </footer>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
